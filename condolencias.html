<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ==========================================
         SEO DE DOMINACIÓN (Categoría Específica)
         ========================================== -->
    <title>Flores de Condolencia y Arreglos Fúnebres en Viña del Mar | La Foresta</title>
    <meta name="description" content="Arreglos florales de condolencia, coronas y pedestales fúnebres con despacho urgente en Viña del Mar, Reñaca y Concón. Diseños sobrios y respetuosos.">
    <meta name="keywords" content="flores de condolencia, arreglos fúnebres, coronas de flores, despacho urgente, viña del mar, reñaca, concón, florería fúnebre">
    <link rel="canonical" href="https://laforestaflores.cl/condolencias.html">
    <link rel="icon" type="image/png" href="/img/favicon.png">

    <!-- OPTIMIZACIÓN SAFARI / IOS -->
    <meta name="theme-color" content="#fcfaf7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Condolencias">

    <!-- OPEN GRAPH -->
    <meta property="og:site_name" content="La Foresta Flores">
    <meta property="og:title" content="Flores de Condolencia | La Foresta Flores">
    <meta property="og:description" content="Diseños florales sobrios y elegantes para acompañar con respeto. Despacho urgente en Viña del Mar, Reñaca y Concón.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://laforestaflores.cl/condolencias.html">
    <meta property="og:image" content="https://laforestaflores.cl/img/social-share.jpg">

    <!-- DATOS ESTRUCTURADOS DE CATEGORÍA (CollectionPage) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": "Flores de Condolencia y Arreglos Fúnebres",
      "url": "https://laforestaflores.cl/condolencias.html",
      "description": "Arreglos florales de condolencia con despacho express en la V Región.",
      "publisher": {
        "@type": "Organization",
        "name": "La Foresta Flores"
      }
    }
    </script>

    <!-- Tailwind y Fuentes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@200;300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --forest-green: #0a1f1c;
            --gold-leaf: #c5a059;
            --soft-cream: #fcfaf7;
        }
        body {
            background-color: var(--soft-cream);
            color: var(--forest-green);
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .product-card {
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .product-card:hover {
            transform: translateY(-8px);
        }
        .img-zoom-container {
            overflow: hidden;
            background-color: #f4f4f5;
        }
        /* Zoom limpio sin tocar los colores */
        .img-zoom-container img {
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .product-card:hover .img-zoom-container img {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Navegación -->
    <nav class="fixed w-full z-50 bg-[#fcfaf7]/95 backdrop-blur-lg px-6 md:px-12 py-5 flex justify-between items-center border-b border-[#0a1f1c]/5">
        <a href="/index-test.html" class="cursor-pointer">
            <img src="img/logo-menu.png" alt="La Foresta Flores Logo" class="h-6 md:h-8 w-auto object-contain">
        </a>
        <div class="flex items-center space-x-8">
            <a href="/index-test.html?action=open_vault#vault" class="text-[10px] font-bold uppercase tracking-widest hover:text-[#c5a059] transition-colors">Volver a Colección</a>
        </div>
    </nav>

    <!-- Encabezado de Categoría -->
    <header class="pt-40 pb-16 px-6 max-w-4xl mx-auto text-center">
        <span class="text-[#c5a059] text-[10px] font-bold uppercase tracking-[0.4em] mb-6 block">Memorial & Respeto</span>
        <h1 class="text-5xl md:text-7xl font-serif italic mb-8 leading-tight text-[#0a1f1c]">Acompañamos <br>con respeto y paz.</h1>
        <p class="text-lg text-zinc-600 font-light leading-relaxed max-w-2xl mx-auto">
            Diseños florales sobrios y etéreos, curados en tonos blancos y pasteles para transmitir calma. Logística prioritaria para llegar a tiempo donde más se necesita.
        </p>
    </header>

    <!-- Grilla Curada Alta Densidad (2 celular, 3 tablet, 4 pc) -->
    <main class="pb-32 px-6 md:px-12 max-w-7xl mx-auto">
        <div id="category-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-4 md:gap-x-8 gap-y-12 md:gap-y-16">
            <!-- Los ramos se inyectarán aquí mediante JS -->
        </div>
    </main>

    <!-- Footer Simple -->
    <footer class="bg-forest-green text-soft-cream py-12 px-6 border-t border-gold-leaf/20 text-center">
        <p class="text-[9px] uppercase tracking-widest opacity-40">La Foresta Flores & Garden. Despacho Prioritario V Región.</p>
    </footer>

    <script>
        // Catálogo filtrado solo para Condolencias (Ramos 1 y 8 + El espacio para los clones de la competencia)
        const categoryCatalog = [
            { id: 1, name: "Amor Delicado", price: 28900, img: "img/RAMOS01.jpeg", desc: "Lisianthus de seda, lilium aromáticos, limonium y sutiles astromelias.", url: "amor-delicado.html" },
            { id: 8, name: "Suave Amanecer", price: 37900, img: "img/RAMOS08.jpeg", desc: "Lisianthus de colección, rosas finas, maules y una suave neblina de gypso.", url: "suave-amanecer.html" }
            // AQUÍ AGREGARÁS LOS 15 CLONES DE ENCACTUS, EJ:
            // { id: 201, name: "Corona Memorial Premium", price: 95000, img: "img/LF-condolencias-corona.jpg", desc: "Corona tejida en rosas blancas.", url: "corona-memorial.html" }
        ];

        const grid = document.getElementById('category-grid');
        grid.innerHTML = categoryCatalog.map(product => `
            <div class="product-card group flex flex-col">
                <a href="${product.url}" class="block">
                    <!-- img-zoom-container maneja el zoom limpio -->
                    <div class="img-zoom-container aspect-square mb-4 md:mb-6 relative bg-[#fcfaf7] border border-zinc-200 flex items-center justify-center">
                        <span class="font-serif italic text-zinc-300 text-3xl absolute z-0">LF</span>
                        
                        <!-- SE BORRÓ EL GRAYSCALE DE TAILWIND (Color al 100%) -->
                        <img src="${product.img}" onerror="this.style.opacity='0'" class="w-full h-full object-cover relative z-10" alt="${product.name}" loading="lazy">
                        
                        <div class="absolute top-2 right-2 md:top-4 md:right-4 bg-white/90 backdrop-blur-md px-2 py-1 text-[8px] md:text-[9px] font-bold uppercase tracking-widest text-[#0a1f1c] shadow-sm z-20">
                            Condolencias
                        </div>
                    </div>
                </a>
                
                <div class="flex flex-col flex-grow mb-4">
                    <a href="${product.url}" class="hover:text-[#c5a059] transition-colors">
                        <h3 class="font-serif text-sm md:text-xl italic text-[#0a1f1c] leading-tight mb-1">${product.name}</h3>
                    </a>
                    <p class="text-[8px] md:text-[10px] uppercase tracking-widest opacity-60 mt-1 line-clamp-2">${product.desc}</p>
                </div>
                
                <div class="mt-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                    <span class="font-serif text-base md:text-xl text-[#0a1f1c]">$${product.price.toLocaleString()}</span>
                    <button onclick="agregarYVolver(${product.id}, '${product.name}', ${product.price}, '${product.img}')" 
                            class="w-full md:w-auto px-4 py-3 border border-[#0a1f1c] text-[#0a1f1c] text-[9px] md:text-[10px] font-bold uppercase tracking-widest hover:bg-[#0a1f1c] hover:text-[#c5a059] transition-colors duration-300 text-center">
                        Añadir
                    </button>
                </div>
            </div>
        `).join('');

        function agregarYVolver(id, name, price, img) {
            let cart = JSON.parse(localStorage.getItem('laforesta_cart')) || [];
            const existing = cart.find(item => item.id === id);
            
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price, img, qty: 1 });
            }
            
            localStorage.setItem('laforesta_cart', JSON.stringify(cart));
            
            // Retorno directo al laboratorio de pruebas abriendo la bolsa
            window.location.href = '/index-test.html?action=open_cart';
        }
    </script>
</body>
</html>
