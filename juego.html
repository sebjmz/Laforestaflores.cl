<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Botánico Virtual | La Foresta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@200;300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --forest-green: #0a1f1c;
            --gold-leaf: #c5a059;
            --soft-cream: #fcfaf7;
        }
        body {
            background-color: var(--soft-cream);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--forest-green);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Estilo Tarjeta Apple */
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(10, 31, 28, 0.08);
            border-radius: 2rem;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Animación del "Ser Vivo" (La Planta) */
        .plant-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffffff, #f0ede6);
            box-shadow: inset 5px 5px 15px rgba(0,0,0,0.05), 
                        10px 10px 30px rgba(197, 160, 89, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            transition: all 0.8s ease;
        }

        .breathing {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0% { transform: scale(1) translateY(0); box-shadow: 0 10px 30px rgba(197, 160, 89, 0.1); }
            50% { transform: scale(1.02) translateY(-5px); box-shadow: 0 15px 40px rgba(197, 160, 89, 0.2); }
            100% { transform: scale(1) translateY(0); box-shadow: 0 10px 30px rgba(197, 160, 89, 0.1); }
        }

        /* Animaciones de entrada/salida de la planta */
        .pop-in {
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* Botón Premium Interactivo */
        .btn-action {
            background: var(--forest-green);
            color: var(--gold-leaf);
            border-radius: 999px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-action:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(10, 31, 28, 0.2);
        }

        .btn-action:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn-action:disabled {
            background: #e4e4e7;
            color: #a1a1aa;
            cursor: not-allowed;
            transform: none;
        }

        /* Barra de progreso estilo iOS */
        .progress-bg {
            background-color: #f4f4f5;
            border-radius: 999px;
            overflow: hidden;
            height: 6px;
            width: 100%;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #c5a059, #e8d09f);
            width: 0%;
            transition: width 1s linear;
            border-radius: 999px;
        }
        
        /* Efecto de gotas de agua al regar */
        .water-drop {
            position: absolute;
            font-size: 1.5rem;
            color: #3b82f6;
            animation: dropWater 1s forwards ease-in;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }

        @keyframes dropWater {
            0% { transform: translateY(-50px) scale(1); opacity: 1; }
            80% { transform: translateY(50px) scale(0.8); opacity: 0.8; }
            100% { transform: translateY(60px) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="glass-card w-full max-w-md p-8 md:p-10 relative text-center">
        <!-- Encabezado -->
        <div class="mb-8">
            <span class="text-[9px] font-bold uppercase tracking-[0.4em] text-[#c5a059] block mb-2">Gemelo Digital</span>
            <h1 class="font-serif text-3xl italic text-[#0a1f1c]">Mi Jardín Virtual</h1>
            <p class="text-xs text-[#0a1f1c]/50 uppercase tracking-widest mt-2" id="plant-type">Lisianthus Premium</p>
        </div>

        <!-- Contenedor Visual de la Planta -->
        <div class="plant-container breathing mb-8 relative" id="plant-stage" onclick="crearGotaAgua(event)">
            <!-- Aquí irán tus PNGs transparentes en el futuro. Por ahora usamos Emojis -->
            <div id="plant-image" class="pop-in">🌰</div>
        </div>

        <!-- Información de Estado -->
        <div class="mb-8 h-20 flex flex-col justify-center">
            <h2 id="status-title" class="font-bold text-lg text-[#0a1f1c] mb-1">Semilla Latente</h2>
            <p id="status-desc" class="text-sm font-light text-zinc-500">Esperando su primer riego para activar la germinación.</p>
        </div>

        <!-- Temporizador y Barra de Progreso -->
        <div id="timer-section" class="mb-8 opacity-0 transition-opacity duration-500 hidden">
            <div class="flex justify-between text-[10px] uppercase tracking-widest font-bold text-zinc-400 mb-2">
                <span>Progreso</span>
                <span id="time-left" class="text-[#c5a059] font-mono">00:00:00</span>
            </div>
            <div class="progress-bg">
                <div id="progress-fill" class="progress-bar"></div>
            </div>
        </div>

        <!-- Botones de Acción -->
        <div class="space-y-4">
            <button id="btn-action" onclick="iniciarCrecimiento()" class="btn-action w-full py-4 text-xs font-bold uppercase tracking-[0.2em]">
                💦 Regar Semilla
            </button>
            
            <button id="btn-shop" class="w-full py-3 text-[10px] font-bold uppercase tracking-widest text-[#0a1f1c]/40 hover:text-[#c5a059] transition-colors border-b border-transparent hover:border-[#c5a059] opacity-0 transition-opacity duration-1000 hidden">
                Ver Cuidados Recomendados
            </button>
        </div>
        
        <!-- Clima Local (Simulado) -->
        <div class="mt-8 pt-6 border-t border-[#0a1f1c]/10 flex items-center justify-center gap-2 opacity-60">
            <span class="text-sm">🌤</span>
            <span class="text-[9px] uppercase tracking-widest font-bold">Clima Viña del Mar: 18°C - Humedad Ideal</span>
        </div>
    </div>

    <script>
        /**
         * MOTOR DEL JUEGO ESTILO TRAVIAN
         * Fase 1: Semilla (🌰) - Requiere 5 seg (Para test)
         * Fase 2: Raíces  (🌱) - Requiere 10 seg (Para test)
         * Fase 3: Tallo   (🌿) - Requiere 15 seg (Para test)
         * Fase 4: Flor    (🌸) - Fase Final
         */
        
        // Base de datos de los estados de la planta
        const fases = [
            {
                nivel: 0,
                icono: "🌰", // AQUÍ PONDRÁS: "<img src='semilla.png' class='w-32 object-contain'>"
                titulo: "Semilla Latente",
                desc: "Esperando su primer riego para activar la germinación.",
                accionTexto: "💦 Regar Semilla",
                tiempoRequerido: 0 // Inicia en 0
            },
            {
                nivel: 1,
                icono: "🌱", // AQUÍ PONDRÁS: "<img src='brote.png' class='w-32 object-contain'>"
                titulo: "Desarrollo de Raíces",
                desc: "La semilla ha despertado. Se están formando las raíces primarias.",
                accionTexto: "🧪 Aplicar Nutrientes",
                tiempoRequerido: 5 // Segundos (Para un juego real pondrías ej: 86400 para 24hrs)
            },
            {
                nivel: 2,
                icono: "🌿", // AQUÍ PONDRÁS: "<img src='tallo.png' class='w-32 object-contain'>"
                titulo: "Crecimiento de Tallo",
                desc: "Buscando la luz. El tallo principal comienza a estructurarse.",
                accionTexto: "☀️ Exponer a Luz",
                tiempoRequerido: 10
            },
            {
                nivel: 3,
                icono: "🌸", // AQUÍ PONDRÁS: "<img src='flor-lisianthus.png' class='w-40 object-contain'>"
                titulo: "¡Floración Alcanzada!",
                desc: "Tu Lisianthus ha florecido maravillosamente. ¡Excelente trabajo botánico!",
                accionTexto: "🎁 Reclamar Recompensa",
                tiempoRequerido: 15
            }
        ];

        let faseActual = 0;
        let temporizador = null;
        let tiempoRestante = 0;
        let tiempoTotalFase = 0;

        const ui = {
            imagen: document.getElementById('plant-image'),
            titulo: document.getElementById('status-title'),
            desc: document.getElementById('status-desc'),
            btnAccion: document.getElementById('btn-action'),
            btnShop: document.getElementById('btn-shop'),
            timerSection: document.getElementById('timer-section'),
            timeLeftTxt: document.getElementById('time-left'),
            progressFill: document.getElementById('progress-fill'),
            plantContainer: document.getElementById('plant-stage')
        };

        function actualizarUI() {
            const fase = fases[faseActual];
            
            // Animación de cambio de imagen
            ui.imagen.classList.remove('pop-in');
            void ui.imagen.offsetWidth; // Forzar reflow para reiniciar animación
            
            ui.imagen.innerHTML = fase.icono;
            ui.imagen.classList.add('pop-in');
            
            ui.titulo.innerText = fase.titulo;
            ui.desc.innerText = fase.desc;
            ui.btnAccion.innerText = fase.accionTexto;

            // Si llegamos al final (Floración)
            if (faseActual === fases.length - 1) {
                ui.timerSection.classList.add('hidden');
                ui.btnAccion.disabled = false;
                ui.btnAccion.classList.add('bg-gradient-to-r', 'from-[#c5a059]', 'to-[#e8d09f]', 'text-[#0a1f1c]');
                ui.btnAccion.onclick = reclamarPremio;
                
                ui.btnShop.classList.remove('hidden');
                setTimeout(() => ui.btnShop.classList.remove('opacity-0'), 100);
            }
        }

        function iniciarCrecimiento() {
            // Efecto visual de clic (gotas)
            crearGotaAguaAguaFalsa();

            // Deshabilitar botón
            ui.btnAccion.disabled = true;
            ui.btnAccion.innerText = "⏳ Trabajando la tierra...";

            // Mostrar el temporizador
            ui.timerSection.classList.remove('hidden');
            setTimeout(() => ui.timerSection.classList.remove('opacity-0'), 100);

            // Calcular siguiente fase
            const siguienteFase = fases[faseActual + 1];
            tiempoTotalFase = siguienteFase.tiempoRequerido;
            tiempoRestante = tiempoTotalFase;

            // Motor del tiempo (Intervalo de 1 segundo)
            temporizador = setInterval(tick, 1000);
            tick(); // Ejecutar el primer segundo inmediatamente
        }

        function tick() {
            if (tiempoRestante <= 0) {
                // El tiempo terminó, avanzamos de nivel
                clearInterval(temporizador);
                faseActual++;
                
                // Ocultar timer
                ui.timerSection.classList.add('opacity-0');
                setTimeout(() => {
                    ui.timerSection.classList.add('hidden');
                    ui.progressFill.style.width = '0%';
                }, 500);

                // Reactivar botón y actualizar UI
                ui.btnAccion.disabled = false;
                actualizarUI();
                return;
            }

            // Actualizar textos y barra
            ui.timeLeftTxt.innerText = formatoTiempo(tiempoRestante);
            
            const porcentaje = ((tiempoTotalFase - tiempoRestante) / tiempoTotalFase) * 100;
            ui.progressFill.style.width = `${porcentaje}%`;

            tiempoRestante--;
        }

        function reclamarPremio() {
            alert("¡Felicidades! Has cultivado con éxito tu planta virtual. Tienes un 15% de descuento en tu próxima compra física usando el código: BOTANICA15");
        }

        // Formateador HH:MM:SS
        function formatoTiempo(segundosTotales) {
            const h = Math.floor(segundosTotales / 3600);
            const m = Math.floor((segundosTotales % 3600) / 60);
            const s = Math.floor(segundosTotales % 60);
            
            return [h, m, s]
                .map(val => val < 10 ? '0' + val : val)
                .join(':');
        }

        // --- EFECTOS VISUALES (Polvo de Hadas / Agua) ---
        function crearGotaAgua(e) {
            if(faseActual === fases.length - 1) return; // Si ya floreció, no hacemos gotas
            
            const gota = document.createElement('div');
            gota.classList.add('water-drop');
            gota.innerText = "✨"; // Puedes cambiarlo por 💧
            
            // Posición basada en el clic dentro del contenedor
            const rect = ui.plantContainer.getBoundingClientRect();
            const x = e.clientX - rect.left - 10;
            const y = e.clientY - rect.top - 10;
            
            gota.style.left = `${x}px`;
            gota.style.top = `${y}px`;
            
            ui.plantContainer.appendChild(gota);
            
            // Eliminar elemento del DOM tras la animación
            setTimeout(() => { gota.remove(); }, 1000);
        }

        // Función para generar gotas desde el centro cuando se presiona el botón principal
        function crearGotaAguaAguaFalsa() {
            const rect = ui.plantContainer.getBoundingClientRect();
            const fakeEvent = {
                clientX: rect.left + (rect.width / 2) + (Math.random() * 40 - 20),
                clientY: rect.top + (rect.height / 2) - 40
            };
            crearGotaAgua(fakeEvent);
            setTimeout(() => crearGotaAgua({
                clientX: fakeEvent.clientX + 30, 
                clientY: fakeEvent.clientY + 20
            }), 200);
        }

        // Iniciar la UI al cargar
        actualizarUI();
    </script>
</body>
</html>
